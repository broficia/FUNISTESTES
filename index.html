<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade GoldBet VIP - Futebol & Green</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: radial-gradient(ellipse at 50% 0%, hsla(142,71%,45%,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 50%, hsla(43,74%,49%,0.05) 0%, transparent 50%),
                        hsl(120,30%,3%);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }

        .text-gradient-gold {
            background: linear-gradient(135deg, hsl(43,74%,49%), hsl(43,90%,70%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .text-gradient-green {
            background: linear-gradient(135deg, hsl(142,71%,45%), hsl(160,60%,55%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .glass-card {
            background: linear-gradient(135deg, hsla(120,15%,8%,0.8), hsla(120,15%,6%,0.9));
            border: 1px solid hsl(120,10%,18%);
            backdrop-filter: blur(20px);
        }
        .glow-green {
            box-shadow: 0 0 30px hsla(142,71%,45%,0.3), 0 0 60px hsla(142,71%,45%,0.1);
        }

        .btn-cta {
            background: linear-gradient(to right, hsl(142,71%,45%), hsl(142,71%,45%));
            animation: pulse-glow 2s infinite;
            position: relative; overflow: hidden;
        }
        .btn-cta::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px hsla(142,71%,45%,0.4), 0 0 40px hsla(142,71%,45%,0.2); }
            50% { box-shadow: 0 0 30px hsla(142,71%,45%,0.6), 0 0 60px hsla(142,71%,45%,0.3); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        .progress-fill { transition: width 2.5s ease-out; }

        .notif-entrou {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(255,255,255,0.95); color: #333;
            padding: 10px 15px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 100; transform: translateX(-120%);
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        .notif-entrou.show { transform: translateX(0); }
        .notif-entrou img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }

        .carousel-track {
            display: flex;
            width: max-content;
            animation: scroll 40s linear infinite;
        }
        .carousel-track:hover { animation-play-state: paused; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .testimonial-card {
            min-width: 260px;
            max-width: 260px;
            margin: 0 10px;
            padding: 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, hsla(120,15%,8%,0.8), hsla(120,15%,6%,0.9));
            border: 1px solid hsl(120,10%,18%);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .particle {
            position: fixed; width: 4px; height: 4px; border-radius: 50%;
            background: hsla(142,71%,45%,0.3); pointer-events: none;
            animation: float-particle 4s ease-in-out infinite;
        }
        @keyframes float-particle {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-20px); opacity: 0.7; }
        }

        .fade-up {
            opacity: 0; transform: translateY(30px);
            animation: fadeUp 0.6s ease-out forwards;
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }
        .delay-4 { animation-delay: 0.6s; }
        .delay-5 { animation-delay: 0.75s; }

        .logo-glow {
            animation: logoIn 0.6s ease-out forwards;
            opacity: 0; transform: scale(0.8);
        }
        @keyframes logoIn {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="relative z-10 mx-auto max-w-2xl px-4 py-8 md:py-12">

<!-- LOGO/BANNER CORRIGIDO -->
<div class="logo-glow mx-auto mb-8 flex justify-center">
    <div class="relative w-full max-w-md">
        <div class="absolute -inset-2 rounded-2xl blur-xl" style="background: linear-gradient(to bottom right, hsla(142,71%,45%,0.3), hsla(43,74%,49%,0.2));"></div>
        <img src="https://disrupty-uploads-20251016.s3.us-east-1.amazonaws.com/checkout-blocks/1773975365308_w4vwf5" class="relative w-full rounded-2xl border-2 object-cover shadow-2xl">
    </div>
</div>

<h1 class="text-center text-3xl font-extrabold">
COMUNIDADE REI DELAS 👑 A MAIOR COMUNIDADE DE SINAIS E HORÁRIOS PAGANTES DO BRASIL. 🔥
</h1>

<p class="text-center mt-4">
receba análises diárias, horários pagantes, palpites exclusivos e acompanhe lives ao vivo operando nos melhores jogos do dia 💰
</p>

<!-- BOTÃO COM LINK -->
<div class="mt-6 flex justify-center">
<a href="https://chat.whatsapp.com/Kzy2K3I1feOGVtQsBk3ZmD?mode=gi_t" class="btn-cta px-8 py-4 rounded-2xl font-bold">
Entrar no Grupo Agora!
</a>
</div>

</div>

<!-- CARROSSEL -->
<section class="py-16">
<div class="overflow-hidden">
<div class="carousel-track" id="carousel-track"></div>
</div>
</section>

<script>
const testimonials = [
{name:"Top demais"},
{name:"Muito bom"},
{name:"Lucrei muito"},
{name:"Grupo brabo"},
{name:"Só green"},
{name:"Recomendo"},
{name:"Surreal"},
{name:"Perfeito"}
];

const track = document.getElementById("carousel-track");
const all = [...testimonials,...testimonials];

all.forEach(t=>{
let div=document.createElement("div");
div.className="testimonial-card";
div.innerHTML=`<p>${t.name}</p>`;
track.appendChild(div);
});
</script>

</body>
</html>
