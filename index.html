<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body {
background: radial-gradient(ellipse at 50% 0%, hsla(142,71%,55%,0.12) 0%, transparent 60%),
radial-gradient(ellipse at 80% 50%, hsla(43,90%,60%,0.08) 0%, transparent 50%),

h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }

.text-gradient-gold {
background: linear-gradient(135deg, hsl(43,90%,60%), hsl(43,100%,75%));

-webkit-text-fill-color: transparent;
}

.carousel-track {

<body>

<script>

"absurdo","recomendo","top demais","perfeito"

let track=document.getElementById("carousel-track");

[...depoimentos,...depoimentos].forEach(t=>{
let div=document.createElement("div");
div.className="testimonial-card";

track.appendChild(div);

</script>
