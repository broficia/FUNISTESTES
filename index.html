<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comunidade GoldBet VIP</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#050505;
color:white;
font-family:sans-serif;
overflow-x:hidden;
}

/* CORES MAIS VIVAS */
.text-gold{color:#FFD700;}
.text-green{color:#00FF88;}

.btn-cta{
background:linear-gradient(90deg,#00FF88,#00cc66);
box-shadow:0 0 20px rgba(0,255,136,0.6);
animation:pulse 2s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* NOTIF */
.notif{
position:fixed;
bottom:20px;
left:20px;
background:white;
color:black;
padding:10px 15px;
border-radius:20px;
font-size:14px;
transform:translateX(-120%);
transition:.4s;
z-index:999;
}
.notif.show{transform:translateX(0);}

/* CARROSSEL */
.carousel-track{
display:flex;
width:max-content;
animation:scroll 30s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}
.card{
min-width:240px;
margin:10px;
padding:15px;
background:#111;
border-radius:12px;
}

/* CONTADOR */
.count{
font-weight:bold;
color:#FFD700;
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4 text-center">

<!-- BANNER -->
<img src="https://disrupty-uploads-20251016.s3.us-east-1.amazonaws.com/checkout-blocks/1773975365308_w4vwf5" style="width:100%;border-radius:15px;">

<h1 class="mt-4 text-xl font-bold text-green">
COMUNIDADE REI DELAS 👑 A MAIOR COMUNIDADE DE SINAIS E HORÁRIOS PAGANTES DO BRASIL
</h1>

<p class="mt-3">
receba análises diárias, horários pagantes, palpites exclusivos e acompanhe lives ao vivo operando nos melhores jogos do dia 💰
</p>

<!-- CONTADOR -->
<p class="mt-3">
⚠️ RESTAM APENAS <span class="count" id="vagas">27</span> VAGAS
</p>

<!-- BOTÃO -->
<a href="https://chat.whatsapp.com/Kzy2K3I1feOGVtQsBk3ZmD?mode=gi_t" class="btn-cta block mt-4 py-4 rounded-xl font-bold">
ENTRAR NO GRUPO AGORA
</a>

</div>

<!-- CARROSSEL -->
<div class="overflow-hidden mt-10">
<div class="carousel-track" id="track"></div>
</div>

<!-- NOTIF -->
<div class="notif" id="notif"></div>

<script>

/* CONTADOR DIMINUINDO */
let vagas=27;
setInterval(()=>{
if(vagas>3){
vagas--;
document.getElementById("vagas").innerText=vagas;
}
},4000);

/* NOTIFICAÇÕES */
const nomes=["Lucas","Ana","Pedro","Julia","Carlos","Marina","Rafael","Bruna"];

function showNotif(){
let nome=nomes[Math.floor(Math.random()*nomes.length)];
let el=document.getElementById("notif");
el.innerText=nome+" entrou no grupo";
el.classList.add("show");
setTimeout(()=>el.classList.remove("show"),3000);
}
setInterval(showNotif,5000);

/* CARROSSEL */
const depo=[
"lucrei muito 🔥",
"grupo brabo demais",
"só green aqui",
"melhor que já vi",
"entrei ontem e já bati meta",
"simplesmente absurdo",
"recomendo demais",
"top top"
];

let track=document.getElementById("track");

[...depo,...depo].forEach(t=>{
let div=document.createElement("div");
div.className="card";
div.innerText=t;
track.appendChild(div);
});

</script>

</body>
</html>
