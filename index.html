<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACESSO EXCLUSIVO - VIP FOOTBALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: #040b04;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-green {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.5);
        }
        .pulse-fast {
            animation: pulseCustom 1.5s infinite;
        }
        @keyframes pulseCustom {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Notificação Flutuante -->
    <div id="notif" class="fixed top-5 left-1/2 -translate-x-1/2 w-[90%] max-w-[320px] glass p-3 rounded-2xl flex items-center gap-3 z-50 hidden animate__animated">
        <img id="notif-img" src="" class="w-10 h-10 rounded-full object-cover border-2 border-green-500">
        <div class="text-sm">
            <span id="notif-name" class="font-bold"></span>
            <span class="text-gray-300"> entrou no grupo agora!</span>
        </div>
    </div>

    <div class="max-w-md w-full space-y-6 text-center">
        
        <!-- Badges de Status -->
        <div class="flex justify-center gap-2 mb-2">
            <span class="bg-red-600 text-[10px] font-bold px-2 py-1 rounded animate-pulse">● AO VIVO</span>
            <span class="bg-white/10 text-[10px] font-bold px-2 py-1 rounded text-gray-300 underline">RESTAM 7 VAGAS</span>
        </div>

        <!-- Título Impactante -->
        <h1 class="text-4xl font-black italic uppercase leading-none tracking-tight">
            COPIE NOSSAS <br> 
            <span class="text-green-500">ENTRADAS VIP</span>
        </h1>

        <p class="text-gray-300 text-sm px-4">
            Acompanhe o grupo onde os especialistas em futebol lucram todos os dias. 
            <b>Acesso gratuito apenas hoje via TikTok.</b>
        </p>

        <!-- Container Principal -->
        <div class="glass p-6 rounded-[2rem] space-y-6 relative overflow-hidden">
            
            <!-- Barra de Vagas -->
            <div class="space-y-2">
                <div class="flex justify-between text-[11px] font-bold text-gray-400">
                    <span>VAGAS PREENCHIDAS</span>
                    <span class="text-green-500">94%</span>
                </div>
                <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden border border-white/5">
                    <div class="bg-green-500 h-full w-[94%] shadow-[0_0_10px_#22c55e]"></div>
                </div>
            </div>

            <!-- Botão de Ação -->
            <div class="space-y-4 pt-2">
                <a href="SEU_LINK_DO_WHATSAPP_AQUI" class="btn-green pulse-fast block w-full py-5 rounded-2xl text-xl font-black uppercase tracking-wider text-white transition-all active:scale-95">
                    Quero entrar no grupo!
                </a>
                
                <!-- Verificadores -->
                <div class="flex items-center justify-center gap-4 opacity-60">
                    <div class="flex items-center gap-1">
                        <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                        <span class="text-[10px] font-bold text-white uppercase">Acesso Seguro</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                        <span class="text-[10px] font-bold text-white uppercase">Grátis hoje</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rodapé Minimalista -->
        <div class="text-[10px] text-gray-500 uppercase tracking-widest pt-4">
            <p>Este link expira em <span id="timer" class="text-white">05:00</span></p>
        </div>
    </div>

    <script>
        // Sistema de Notificações Fake
        const usuarios = [
            {n: "Matheus Oliveira", i: "https://i.pravatar.cc/100?u=1"},
            {n: "Rodrigo Silva", i: "https://i.pravatar.cc/100?u=2"},
            {n: "Juliana Costa", i: "https://i.pravatar.cc/100?u=3"},
            {n: "Lucas Pereira", i: "https://i.pravatar.cc/100?u=4"},
            {n: "Amanda Souza", i: "https://i.pravatar.cc/100?u=5"},
            {n: "Bruno Henrique", i: "https://i.pravatar.cc/100?u=6"}
        ];

        function pushNotif() {
            const el = document.getElementById('notif');
            const user = usuarios[Math.floor(Math.random() * usuarios.length)];
            
            document.getElementById('notif-img').src = user.i;
            document.getElementById('notif-name').innerText = user.n;

            el.classList.remove('hidden', 'animate__fadeOutUp');
            el.classList.add('animate__fadeInDown');

            setTimeout(() => {
                el.classList.replace('animate__fadeInDown', 'animate__fadeOutUp');
            }, 3000);
        }

        // Timer Regressivo
        let time = 300;
        setInterval(() => {
            if(time <= 0) return;
            time--;
            const min = Math.floor(time / 60);
            const sec = time % 60;
            document.getElementById('timer').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }, 1000);

        // Loop Notificações
        setInterval(pushNotif, 7000);
        setTimeout(pushNotif, 2000);
    </script>
</body>
</html>
